  <script>
    window.POLICY_DATA = {"meta":{"updatedAt":"2026-04-15 17:15","totalCount":166},"sources":[{"id":"commerce","name":"深圳市商务局","count":20},{"id":"fgw","name":"深圳市发改委","count":16},{"id":"gxj","name":"深圳市工信局","count":20},{"id":"inanshan","name":"南山区企业服务","count":10},{"id":"stic","name":"深圳市科技创新局","count":20},{"id":"szns_gxj","name":"南山区工信局","count":20},{"id":"szns_kcj","name":"南山区科创局","count":20},{"id":"szns_qyfw","name":"南山区企业服务中心","count":20},{"id":"zxqyj","name":"深圳市中小企业服务局","count":20}],"allTags":["人才与项目","企业资质","技术领域","资金支持"],"rssLink":"./深圳政策rss.xml","policies":[{"id":"zxqyj--8948073436460118251","title":"深圳市中小企业服务局关于组织开展2026年专精特新“小巨人”企业申报和复核工作的通知","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12735605.html","date":"2026-04-14","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"各区（新区、特别合作区）中小企业主管部门，各有关企业： 按照《优质中小企业梯度培育管理办法》（工信部企业〔2026〕2号，以下简称《办法》）和《工业和信息化部办公厅关于开展2026年度专精特新“小巨人”企业认定和复核工作的通知》（工信厅企业函〔2026〕117号，以下简称《通知》）要求，现组织开展2026年专精特新“小巨人”企业申报和复核工作。有关事项通知如下： 一、企业申请要求 （一）有效期内深圳市专精特新中小企业可提出第八批专精特新“小巨人”企业申请,2023年认定的第五批和复核通过的第二批专精特新“小巨人”企业可提出复核申请。","tags":["企业资质"]},{"id":"zxqyj-2371670387283940639","title":"深圳市中小企业服务局关于开展我市优质中小企业年度信息更新工作的通知","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12732042.html","date":"2026-04-13","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"各区（大鹏新区、深汕特别合作区）中小企业主管部门，各有关企业： 根据工业和信息化部《优质中小企业梯度培育管理办法》相关规定，有效期内创新型中小企业、专精特新中小企业和专精特新“小巨人”企业，需在2026年5月31日前通过优质中小企业梯度培育平台（网址为：https://zjtx.miit.gov.cn ）完成年度信息更新工作。在同一个有效期内，对首次未进行更新的企业重点监测，对累计两次未更新的企业取消认定。 目前梯度培育平台年度信息更新模块已开放，请优质中小企业高度重视，按时完成信息更新工作，并对信息的真实性和准确性负责，信息更新数据将作为中小企业专精特新发展评价得分参考依据。","tags":["企业资质"]},{"id":"szns_gxj-4549304102081097638","title":"南山区工业和信息化局2025年工作总结及2026年重点工作安排","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12732/post_12732976.html","date":"2026-04-13","sourceId":"szns_gxj","source":"南山区工信局","summary":"一、2025年工作总结 （一）全力以赴冲万亿、稳投资，夯实稳中有进基本盘。 一是 稳固工业底盘。 分层优化服务，分类挖掘增量，南山区规上工业全年总产值突破9000亿元，发展基础持续夯实。 二是做强营利性服务业增长极。 全面深化服务链条，压实区街联动机制，营利性服务业营收总量达1.1万亿元，展现强劲增长动能。 三是全力以赴抓工业投资。 持续推进算力挖潜、总部挖潜，用好“技改券”，加强多部门协同，实现稳步增长。 （二）聚势谋远育集群、抢先机，塑造战新产业新优势。 软件和信息服务集群优势地位巩固。","tags":["技术领域","企业资质"]},{"id":"szns_gxj-8889462291956273568","title":"关于公开遴选2026年二季度、三季度“流量券”平台企业的通知","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12728/post_12728038.html","date":"2026-04-09","sourceId":"szns_gxj","source":"南山区工信局","summary":"各企业: 为保障流量券发放的公平性、便捷性、安全性，现面向社会公开遴选2026年二季度、三季度符合条件的平台企业承担流量券活动服务工作，现将有关事项通知如下: 一、平台职责 （一）加强风险监测，完善风险管控机制，防范和阻止虚构信息领券、流量券套现等不法行为发生，若有前述情形或迹象，应当及时报告、有效处理，保障资金安全。 （二）充分调动和利用平台资源，加大宣传力度，提高广告商及南山区企业的知晓率及参与度。 （三）组织专业服务团队，受理解决流量券发放、使用过程中的咨询、投诉等相关问题，确保流量券发放平稳有序。","tags":[]},{"id":"szns_kcj-8360004198721471176","title":"关于申报2026年度科技企业“贴息券”项目的通知","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12728/post_12728245.html","date":"2026-04-09","sourceId":"szns_kcj","source":"南山区科创局","summary":"各有关单位: 2026年度科技企业“贴息券”项目即将开通申报，现将有关事项通知如下: 一、申报时间 2026年4月13日-2026年4月24日18:00。 二、申报平台 项目在“Ai南山企业服务综合平台”网站上进行在线申报。首页点击“找政策——资金申报”进入资金申报页面，点击“展开筛选”，“管理部门”栏选择“区科技创新局”，即可浏览并进入区科技创新局已开通申报项目。 三、注意事项 （一）各单位在正式申报项目前，请仔细研读《南山区促进产业高质量发展专项资金管理办法》 《南山区支持产业发展“六个券”行动方案》 、项目操作规程（详见附件）及申报通知，按具体要求进行申报。","tags":["资金支持"]},{"id":"szns_gxj-7053585254312241164","title":"关于公开遴选2026年上半年“模型券”服务商的通知","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12725/post_12725744.html","date":"2026-04-08","sourceId":"szns_gxj","source":"南山区工信局","summary":"各企业: 为保障模型券发放的公平性、便捷性、安全性，现面向社会公开遴选2026年上半年符合条件的服务商承担模型券服务工作，现将有关事项通知如下: 一、服务商职责 （一）加强风险监测，完善风险管控机制，防范和阻止虚构信息领券、模型券套现等不法行为发生，若有前述情形或迹象，应当及时报告、有效处理，保障资金安全。 （二）充分调动和利用平台资源，加大宣传力度，提高南山区企业的知晓率及参与度。 （三）组织专业服务团队，受理解决模型券使用过程中的咨询、投诉等相关问题，确保模型券使用平稳有序。","tags":[]},{"id":"szns_gxj-8065706257103479343","title":"事业单位法人年度报告书（2025年度）","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12724/post_12724035.html","date":"2026-04-07","sourceId":"szns_gxj","source":"南山区工信局","summary":"深圳市南山区产业园区发展促进中心事业单位法人年度报告书（2025年度）已发布，详见附件。 附件： 1． 事业单位法人年度报告书.pdf","tags":[]},{"id":"szns_kcj-2765065904950630551","title":"关于征集南山区知识产权公共服务需求的通知","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12724/post_12724343.html","date":"2026-04-07","sourceId":"szns_kcj","source":"南山区科创局","summary":"为进一步提升南山区创新主体知识产权运用与保护能力，即日起，深圳南山知识产权保护中心公共服务平台（网址：https://nsippc.szns.gov.cn）正式上线知识产权公共服务，助力创新主体优化技术布局、防控侵权风险、促进成果落地转化。 一、服务内容 （一）技术分析全流程服务 根据创新主体技术研发和市场拓展等实际需求，针对核心技术发展趋势、竞争对手专利布局、风险预警等不同主题，输出技术分析报告，并提供技术领域专利动态跟踪、专利合规自查指导服务。","tags":[]},{"id":"szns_kcj-2759751178923000223","title":"南山区科技创新局关于《南山区促进产业高质量发展专项资金——区科技创新局分项资金专业引领型孵化载体支持计划操作规程（征求意见稿）》公开征求意见的通知","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12719/post_12719620.html","date":"2026-04-03","sourceId":"szns_kcj","source":"南山区科创局","summary":"各有关单位： 根据《南山区促进产业高质量发展专项资金管理办法》、《南山区促进科技创新专项扶持措施》，我局制定了《南山区促进产业高质量发展专项资金——区科技创新局分项资金专业引领型孵化载体支持计划操作规程（征求意见稿）》。 为了广泛听取社会公众专业意见，进一步提高政策申报的专业性、精确性，现将相关操作规程征求意见稿予以公布，征求社会各界意见。有关单位和各界人士如对征求意见稿有修改意见，可以在公示发布之日起5个工作日内，将书面意见材料发送至邮箱：cyzx@szns.gov.cn，逾期不予受理。意见材料应当说明意见事项、理由并提供相应证明，同时注明联系人及联系方式。","tags":["资金支持"]},{"id":"zxqyj--6138946198061486783","title":"深圳市中小企业服务局关于2025年度逾期尚未支付中小企业款项情况的公示","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12713793.html","date":"2026-03-31","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"根据《保障中小企业款项支付条例》有关规定，现将我局2025年度逾期尚未支付中小企业款项情况公示如下： 我局2025年度逾期尚未支付中小企业款项的合同数为0个，涉及金额为0元。 深圳市中小企业服务局 2026年3月31日","tags":["企业资质"]},{"id":"szns_qyfw--2097433645061282428","title":"关于开通南山区行业协会专业交流活动支持项目的通知","link":"https://www.szns.gov.cn/nsqqyfzfwzx/gkmlpt/content/12/12711/post_12711305.html","date":"2026-03-31","sourceId":"szns_qyfw","source":"南山区企业服务中心","summary":"各有关协会： 南山区行业协会业专业交流活动支持项目现已开通受理。具体有关事项通知如下： 一、受理时间 2026年3月31日9:00至2026年4月13日18:00。 二、申报平台 项目在“i南山企业服务综合平台”网站上进行在线申报。首页点击“企业服务——政策服务——资金申报”，进入资金申报页面，主题分类选择“行业协会”，即可浏览并进入相关已开通项目进行申报。 三、注意事项 1.各协会在正式申报项目前，请认真阅读相关操作规程，按操作规程要求进行申报。 2.申报专业交流活动支持项目，须完成活动备案手续。 3.各单位网上提交申请材料后，可通过手机短信或通过申报系统查看项目申请进展状态。","tags":[]},{"id":"commerce-4804988134329700263","title":"深圳市促进外贸提质增效三年行动计划——“出口深圳”专项措施","link":"https://commerce.sz.gov.cn/xxgk/zcfgjzcjd/zcfg/content/post_12708763.html","date":"2026-03-30","sourceId":"commerce","source":"深圳市商务局","summary":"为深入贯彻落实党中央、国务院关于扩大高水平对外开放的决策部署，更好地发挥进口在促进产业转型升级、满足人民美好生活需要、保障供应链安全中的重要作用，推动进出口平衡发展、促进外贸提质增效，结合深圳实际，制定本措施（以下简称“进口十条”）。 一、支持产业升级类产品进口 支持“20+8”产业集群发展所需先进技术设备及关键零部件进口，指导帮助企业就纳入《鼓励进口技术和产品目录》的技术和产品积极申报国家进口贴息支持，为相关科技前沿产品企业提供减免税“一对一”指导服务。为集成电路、平板显示模组等产业发展所需重要中间品进口制定个性化监管措施，促进关键料件高效投入研发生产。","tags":[]},{"id":"szns_kcj-1032704962762088812","title":"关于申报2026年度南山区第一批功能型无人车测试及应用试点的通知","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12707/post_12707294.html","date":"2026-03-30","sourceId":"szns_kcj","source":"南山区科创局","summary":"各有关单位: 2026年度南山区第一批功能型无人车测试及应用试点已接受申报,现将有关事项通知如下: 一、申报时间 2026年度南山区第一批功能型无人车测试及应用试点，申报时间：3月28日9:00-4月1日18:00。 二、申报平台 项目在“Ai南山企业服务综合平台”网站（https://www.inanshan.org.cn/）上进行在线申报。通过首页“找政策”进入资金申报页面，点击“展开筛选”，“管理部门”栏选择“区科技创新局”，进入区科技创新局“正在进行”项目，选择“南山区第一批功能型无人车测试及应用项目”。","tags":[]},{"id":"szns_qyfw--8053986786233611582","title":"巡察公告","link":"https://www.szns.gov.cn/nsqqyfzfwzx/gkmlpt/content/12/12709/post_12709970.html","date":"2026-03-30","sourceId":"szns_qyfw","source":"南山区企业服务中心","summary":"根据区委巡察工作统一部署，2026年3月30日至2026年5月29日，区委第四巡察组对区企业发展服务中心党组开展巡察。巡察期间，区委巡察组主要受理反映区企业发展服务中心党组领导班子及其成员、下一级党组织领导班子主要负责人和其他重要岗位相关工作人员问题的来信来电来访，重点是违反政治纪律、组织纪律、廉洁纪律、群众纪律、工作纪律、生活纪律等方面的举报和反映。其他不属于本次巡察受理范围的信访问题，将按规定由区企业发展服务中心党组和有关部门认真处理。","tags":[]},{"id":"zxqyj--5184162749550945841","title":"市中小企业服务局关于开展深圳市企业家培育工程“星耀鹏城”培训计划（第四期）项目遴选的通知","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12706287.html","date":"2026-03-27","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"各有关单位： 为深入贯彻落实党中央、国务院关于促进中小企业健康发展的决策部署，扎实推进中小企业培育工作，促进中小企业高质量发展，我局现开展深圳市企业家培育工程“星耀鹏城”培训计划（第四期）项目（以下简称“星耀鹏城”培训计划第四期项目）遴选工作，遴选承办单位，征集培训项目。现将有关事项通知如下： 一、承办单位遴选条件 通过公开申报、专家评审等方式，择优遴选承办单位。遴选条件如下： （一）在本市（含深汕特别合作区）生产经营，且具有独立法人资格。","tags":["企业资质"]},{"id":"commerce-2676488250591142875","title":"深圳市商务局关于印发《深圳市商务局〈关于加快建设国际会展之都的若干措施（修订）〉实施细则》的通知","link":"https://commerce.sz.go 2月，南山区国内专利授权量约4.45万件，其中发明专利授权量约2.34万件，累计国内有效发明专利约16.09万件，每万人发明专利拥有量约873件，PCT国际专利申请量约0.41万件；商标申请量约6.67万件，商标注册量约3.64万件，商标有效注册量约53.39万件（注：商标申请量、商标注册量指2024.12.16-2025.12.15的商标统计情况，商标有效注册量指截至2025.12.15的统计情况）。","tags":[]},{"id":"szns_kcj-2094360060037012071","title":"关于征集南山区企业海外知识产权服务需求的通知","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12653/post_12653964.html","date":"2026-02-26","sourceId":"szns_kcj","source":"南山区科创局","summary":"为加强南山区知识产权海外维权公益援助，提升企业海外知识产权纠纷应对能力。即日起，深圳南山知识产权保护中心（网址：https://nsippc.szns.gov.cn）正式上线海外知识产权服务，免费为各创新主体提供海外知识产权布局、纠纷应对指导等服务。 一、服务内容 （一）提供海外知识产权布局指导服务。包括但不限于协助企业开展海外专利申请、商标注册、版权登记等工作。 （二）提供海外知识产权纠纷应对指导服务。针对跨境电商纠纷、海外“专利流氓”狙击、海外商标抢注等热点问题，为南山企业链接海外专家及机构资源，提供风险预警、专家辅导、谈判对策、应诉建议等服务。 （三）提供海外知识产权政策分析服务。","tags":[]},{"id":"zxqyj--2861617803588151775","title":"深圳市中小企业服务局关于组织开展新一轮第三批重点“小巨人”企业预申报工作的通知","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12653225.html","date":"2026-02-25","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"各区（新区、特别合作区）中小企业主管部门，各专精特新“小巨人”企业： 按照财政部、工业和信息化部工作部署，根据《关于进一步支持专精特新中小企业高质量发展的通知》（财建〔2024〕148号）文件要求，我局组织开展新一轮第三批重点“小巨人”企业预申报工作，请各单位、各企业高度重视、超前谋划，提前做好申报工作。","tags":["企业资质"]},{"id":"szns_kcj--8024036049932504650","title":"南山区科技创新局关于第二批人工智能场景应用“揭榜挂帅”项目揭榜结果的公示","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12645/post_12645229.html","date":"2026-02-12","sourceId":"szns_kcj","source":"南山区科创局","summary":"根据《南山区促进人工智能产业高质量发展专项扶持措施》、《南山区支持创新创业“六个一”行动方案》等文件规定，现将南山区第二批人工智能场景应用“揭榜挂帅”项目揭榜结果公示如下： 编号 榜单名称 揭榜方 1 AI赋能碳纤维制造场景 深圳屹艮科技有限公司 2 融合大模型的院前急救智慧诊疗平台 深圳迈瑞生物医疗电子股份有限公司 3 新能源汽车充换电场站“智慧大脑”管理服务场景 深圳市深汇通能源科技发展有限公司 4 提高医生手术技能与质量的AI手术培训场景 深圳格瑞健康科技有限公司 5 全天候社区法律顾问大模型应用场景 深圳市逸游无限科技有限公司 6 基于企业动态画像的全周期精准服务场景 企知道科技有限公…","tags":["技术领域","人才与项目"]},{"id":"szns_qyfw-8958827743979254684","title":"深圳市南山区企业发展服务中心2025年度法治政府建设工作报告","link":"https://www.szns.gov.cn/nsqqyfzfwzx/gkmlpt/content/12/12645/post_12645822.html","date":"2026-02-12","sourceId":"szns_qyfw","source":"南山区企业服务中心","summary":"2025年,深圳市南山区企业发展服务中心(以下简称:中心)坚持以习近平新时代中国特色社会主义思想为指导,不断强化法治思维,加快推动法治政府建设,取得积极成效。 一、围绕区委、区政府有关部署推动法治政府建设的举措和成效 一是积极研讨《南山区促进产业高质量发展专项资金管理办法》等产业扶持政策的修订思路,围绕政策保障经济增长、利于招商引资、做好安商稳商、促进科技创新、加强产业聚集五个目标进行完善,着力提升我区产业政策的逻辑性、精准性、实效性和可操作性,并督促各部门做好现行有效政策项目的开通受理工作。统筹组织全区产业资金专题工作会议、产业资金拨付等工作。","tags":["资金支持"]},{"id":"szns_gxj--297490495450076580","title":"南山区工业和信息化局关于开通2025年下半年“技改券”项目的通知","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12638/post_12638070.html","date":"2026-02-09","sourceId":"szns_gxj","source":"南山区工信局","summary":"各有关企业： 为鼓励企业加快设备更新替换，加快推动行业发展转型升级，根据《南山区支持产业发展“六个券”行动方案》，我局现开通2025年下半年“技改券”项目申报工作。有关事项通知如下： 一、申报时间 2026年2月9日9:00至2026年3月6日18:00。 二、申请条件及详细指引 本次项目针对符合条件的企业工业技改或设备购置项目，按不超过项目经审定投资额的1%予以补贴，每家企业每年支持最高1000万元。详见附件《2025年下半年“技改券”项目操作规程（2026年度）》。 三、注意事项 1、各企业在正式申报项目前，请先仔细阅读首页演示内容，并认真阅读项目操作规程，按操作规程要求进行申报。","tags":["资金支持"]},{"id":"stic--2121284662172009383","title":"图解：一图读懂《广东省推进职务科技成果“先用后转”改革的若干政策措施》","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12638/post_12638011.html","date":"2026-02-09","sourceId":"stic","source":"深圳市科技创新局","summary":"相关链接：广东省科学技术厅等五部门关于印发《广东省推进职务科技成果“先用后转”改革的若干政策措施》的通知","tags":[]},{"id":"stic--1199060780024802485","title":"政策解读：《广东省推进职务科技成果“先用后转”改革的若干政策措施》政策解读","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12638/post_12638003.html","date":"2026-02-09","sourceId":"stic","source":"深圳市科技创新局","summary":"为贯彻落实党的二十届三中、四中全会和省委省政府的改革部署，深化职务科技成果赋权和管理改革，破解职务科技成果“不敢转、不想转、不会转”问题，探索创新科技成果转化的新举措、新模式和新路径，加速科技成果产出和转化应用，省科技厅会同省教育厅、省财政厅、省卫生健康委、省市场监管局研究起草了《广东省推进职务科技成果“先用后转”改革的若干政策措施》（以下简称《措施》），于2026年2月1日起开始实施。现就有关内容解读如下： 一、制定背景 （一）制定《措施》是贯彻落实国家、省委省政府关于先使用后付费方式的决策部署和具体要求的内在需要。","tags":[]},{"id":"szns_gxj--4566680980840607527","title":"关于公开遴选2026年一季度“流量券”广告服务商的通知","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12633/post_12633840.html","date":"2026-02-05","sourceId":"szns_gxj","source":"南山区工信局","summary":"各企业: 为保障流量券发放使用的公平性、便捷性、安全性，现面向社会公开遴选2026年一季度符合条件的广告服务商承担流量券活动服务工作,现将有关事项通知如下: 一、服务商职责 （一）加强风险监测，完善风险管控机制，防范和阻止虚构信息领券、流量券套现等不法行为发生，若有前述情形或迹象，应当及时报告、有效处理，保障资金安全。 （二）充分调动和利用企业资源，加大宣传力度，提高广告商知晓率及参与度。 （三）组织专业服务团队，受理解决流量券发放、使用过程中的咨询、投诉等相关问题，确保流量券发放平稳有序。","tags":[]},{"id":"szns_gxj--5753322898894436122","title":"关于开通“流量券”“模型券”项目的通知","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12624/post_12624962.html","date":"2026-01-30","sourceId":"szns_gxj","source":"南山区工信局","summary":"各有关企业： 南山区促进产业高质量发展专项资金——区工业和信息化局分项资金—“流量券”“模型券”项目即将开通申报。现将有关事项通知如下： 一、申报时间：2026年1月30日9:00至2026年2月13日18:00。 二、申请条件及详细指引：详见附件《南山区促进产业高质量发展专项资金——区工业和信息化局分项资金-2025年四季度“流量券”项目操作规程》、《南山区促进产业高质量发展专项资金——区工业和信息化局分项资金-2025年四季度“模型券”项目操作规程》。 三、注意事项 1、各企业在正式申报项目前，请先仔细阅读首页演示内容，并认真阅读项目操作规程，按操作规程要求进行申报。","tags":["资金支持"]},{"id":"szns_kcj--396174564213948045","title":"关于领取2025年高新技术企业证书的通知","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12624/post_12624453.html","date":"2026-01-30","sourceId":"szns_kcj","source":"南山区科创局","summary":"各有关单位： 按照市工信局要求，南山区2025年高新技术企业证书（工信部已备案部分）将由我局发放，现将有关事项通知如下： 一、领取时间 2026年2月2日-2月4日（周一到周三），上午09:30-11:30，下午02:30-05:00。 二、领取地点 南山区沙河西路深圳湾科技生态园7栋B座三楼南山知识产权保护中心（此次发放证书地点为临时场所，请务必按照领取时间前往领取）。","tags":[]},{"id":"zxqyj-8686320766387304243","title":"深圳市中小企业服务局关于2025年深圳市专精特新中小企业及复核通过的2022年深圳市专精特新中小企业名单的补充公示","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12623186.html","date":"2026-01-29","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"2 025年深圳市专精特新中小企业及复核通过的2022年深圳市专精特新中小企业名单公示期间，经对各区及企业反馈情况进行核实，深圳德克密封技术有限公司等40家企业符合深圳市专精特新中小企业认定标准，深圳市艾能聚科技有限公司等37家企业满足复核条件要求，现予以补充公示。如对公示企业有异议的，请实名反馈，并提供佐证材料和联系方式，以便核实查证，凡匿名、冒名或超出公示期的异议均不予受理。补充公示期间，对上述77家企业之外的异议不再受理。 公示期：2026年1月29日—2月4日。","tags":["企业资质"]},{"id":"szns_gxj-5727358683023403141","title":"关于2025年四季度“模型券”服务商遴选结果的公示","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12620/post_12620984.html","date":"2026-01-28","sourceId":"szns_gxj","source":"南山区工信局","summary":"各有关单位： 根据《关于公开遴选2025年四季度“模型券”服务商的通知》，按照公正、公平、公开原则，经企业申报、内部评审等环节，现将2025年四季度“模型券”服务商遴选结果公布如下： 深圳阿里云计算技术有限公司、腾讯云计算（北京）有限责任公司深圳市分公司。 各有关当事人对遴选结果有异议的，可以在公示发布之日起三日内以实名、书面形式向我局提出，逾期不予受理。 联系人：李先生，联系电话：0755-88168738，电子邮箱： z.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12611596.html","date":"2026-01-22","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"各有关单位： 为贯彻落实《关于进一步支持中小微企业纾困及高质量发展的若干措施》（深工信〔2023〕26号），根据《深圳市中小企业服务局中小企业数字化服务商扶持计划操作规程》（深中小企规〔2024〕1号）要求，我局现组织开展2026年度中小企业数字化服务商扶持计划申报。具体申报要求详见申报指南（附件1）。 建议申报单位预留足够的审核时间，在截止日至少3个工作日前提交。 特此通知。","tags":["企业资质"]},{"id":"szns_kcj--5275627918510767659","title":"南山区科技创新局领导","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12612/post_12612858.html","date":"2026-01-22","sourceId":"szns_kcj","source":"南山区科创局","summary":"姓 名 性 别 职 务 张景平 男 南山区科技创新局党组书记、局长，南山区科学技术协会主席 罗林姣 女 南山区科技创新局二级调研员，南山区科学技术协会常务副主席，南山区政协常委会委员 郑长华 男 南山区科技创新局党组成员、二级调研员 申 晴 女 南山区创新发展促进中心（区知识产权促进中心）主任 董少林 男 南山区科技创新局党组成员、副局长 张 旭 男 南山区科技创新局党组成员、副局长 林 洋 男 南山区科技创新局党组成员、副局长 晏 瞿 女 南山区科学技术协会三级调研员 何贤佳 男 南山区科技创新局四级调研员 刘 静 女 南山区创新发展促进中心（区知识产权促进中心）副主任 蓝 鑫 男 南山区创…","tags":[]},{"id":"szns_gxj--6438229529029333519","title":"南山区工业和信息化局2025年政府信息公开工作年度报告","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12603/post_12603916.html","date":"2026-01-16","sourceId":"szns_gxj","source":"南山区工信局","summary":"一、总体情况 2025年，南山区工业和信息化局深入贯彻落实国家、省、市、区有关政务公开的决策部署和《中华人民共和国政府信息公开条例》（以下简称《条例》），不断提升政务公开工作规范化、标准化水平。 （一）主动公开情况 积极履行法定公开职责，通过南山区人民政府网站等平台，及时、准确地发布政府信息。全年通过区政府网站主动公开政务动态、通知公告、财政预决算、政策文件等各类政府信息53条。同时，依托“创新南山”微信公众号等主流媒体平台，发布惠企政策解读、产业发展动态等信息，扩大信息公开覆盖面。","tags":[]},{"id":"szns_qyfw-1249098571372551345","title":"南山区企业发展服务中心2025年政府信息公开工作年度报告","link":"https://www.szns.gov.cn/nsqqyfzfwzx/gkmlpt/content/12/12599/post_12599956.html","date":"2026-01-14","sourceId":"szns_qyfw","source":"南山区企业服务中心","summary":"根据《中华人民共和国政府信息公开条例》（以下简称《条例》）的规定，现公布深圳市南山区企业发展服务中心2025年度政府信息公开工作年度报告。本报告由总体情况、主动公开政府信息情况、收到和处理政府信息公开申请的情况、政府信息公开行政复议和行政诉讼情况、存在的问题、改进措施和其他需要报告的事项六部分组成，起止时间为2025年1月1日至2025年12月31日。 一、总体情况 2025年，深圳市南山区企业发展服务中心按照区委、区政府的工作部署，重实效、强实干、抓落实，为企业提供贴身、精准服务，推动我区经济高质量发展。","tags":[]},{"id":"zxqyj-1205168032977861789","title":"深圳市中小企业服务局关于2025年深圳市专精特新中小企业和复核通过的2022年深圳市专精特新中小企业名单的公示","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12595049.html","date":"2026-01-09","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"根据《优质中小企业梯度培育管理暂行办法》（工信部企业〔2022〕63号）和《深圳市工业和信息化局优质中小企业梯度培育管理实施细则》（2025年修订版）（深工信规〔2025〕8号）相关规定，我局组织开展了2025年深圳市专精特新中小企业认定及2022年深圳市专精特新中小企业复核工作。经企业自主申报、各区初审推荐、征求相关单位意见、我局审核等程序，深圳新芯智能有限公司等2536家企业符合深圳市专精特新中小企业认定标准，深圳市云帆自动化技术有限公司等2746家2022年深圳市专精特新中小企业满足复核条件，现予以公示。如对公示名单内企业有异议的，请实名反馈，并提供佐证材料和联系方式，以便核实查证。","tags":["企业资质"]},{"id":"szns_gxj-5610967464944353202","title":"关于公开遴选2026年一季度“流量券”平台企业的通知","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12594/post_12594068.html","date":"2026-01-09","sourceId":"szns_gxj","source":"南山区工信局","summary":"各企业: 为保障流量券发放的公平性、便捷性、安全性，现面向社会公开遴选2026年一季度符合条件的平台企业承担流量券活动服务工作,现将有关事项通知如下: 一、平台职责 （一）加强风险监测，完善风险管控机制，防范和阻止虚构信息领券、流量券套现等不法行为发生，若有前述情形或迹象，应当及时报告、有效处理，保障资金安全。 （二）充分调动和利用平台资源，加大宣传力度，提高广告商及南山区企业的知晓率及参与度。 （三）组织专业服务团队，受理解决流量券发放、使用过程中的咨询、投诉等相关问题，确保流量券发放平稳有序。","tags":[]},{"id":"fgw--6988342806839266560","title":"深圳市发展和改革委员会关于印发《深圳市发展和改革委员会战略性新兴产业专项资金操作规程》的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12591706.html","date":"2026-01-08","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2026〕1号 各有关单位： 为加强和规范深圳市发展和改革委员会战略性新兴产业专项资金管理，提高财政专项资金使用效益，按照市级财政专项资金管理有关规定，结合工作实际，我委制定了《深圳市发展和改革委员会战略性新兴产业专项资金操作规程》，现予印发实施，请遵照执行。 特此通知。 深圳市发展和改革委员会 2026年1月6日 深圳市发展和改革委员会战略性新兴产业 专项资金操作规程 第一章 总 则 第一条 为进一步规范深圳市发展和改革委员会战略性新兴产业专项资金（以下简称“委战新产业专项资金”）的组织实施，提高财政专项资金使用效益和管理水平，根据深圳市财政专项资金管理有关规定，结合实际，制定本规…","tags":["资金支持"]},{"id":"gxj-1614430521719254290","title":"《深圳市工业和信息化局科技型企业孵化器管理办法》政策解读","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12586667.html","date":"2026-01-05","sourceId":"gxj","source":"深圳市工信局","summary":"为推动科技创新与产业创新的深度融合，促进本市科技型企业孵化器实现高质量发展，构建良好的创新创业生态，根据《工业和信息化部科技型企业孵化器管理办法》及国家、省、市有关规定，结合深圳实际，深圳市工业和信息化局制定了《深圳市工业和信息化局科技型企业孵化器管理办法》（以下简称《管理办法》），现说明如下。 一、制定背景 原《深圳市科技企业孵化器和众创空间管理办法》（深科技创新规〔2020〕1号，以下简称2020版《管理办法》）已于2025年2月1日到期失效。","tags":[]},{"id":"gxj-6945093284052498832","title":"深圳市工业和信息化局科技型企业孵化器管理办法","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12586663.html","date":"2026-01-05","sourceId":"gxj","source":"深圳市工信局","summary":"深工信规〔2025〕10号 第一章 总则 第一条 为推动科技创新与产业创新深层次融合，促进本市科技型企业孵化器高质量发展，构建良好创新创业生态，依据《工业和信息化部科技型企业孵化器管理办法》及国家、省、市有关规定，结合深圳实际，制定本办法。 第二条 本办法所称科技型企业孵化器（含加速器，以下简称孵化器）是指以促进科技成果转化和产业化、孵化科技型企业、弘扬企业家精神为宗旨，为科技型初创企业和创业团队提供经营设施、创业辅导、技术支持、市场拓展、投资融资、管理咨询等专业服务的科技创业服务机构。","tags":[]},{"id":"szns_kcj-3612808142605398659","title":"南山区科技创新局2025年政府信息公开工作年度报告","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12586/post_12586709.html","date":"2026-01-05","sourceId":"szns_kcj","source":"南山区科创局","summary":"根据《中华人民共和国政府信息公开条例》（以下简称《条例》）以及广东省、深圳市关于政府信息公开相关规定要求，我局编制了《南山区科技创新局2025年政府信息公开工作年度报告》。本报告包括政府信息公开工作概况、主动公开情况、收到和处理政府信息公开申请情况、政府信息公开行政复议和行政诉讼情况、存在的主要问题和改进措施、其他需要报告的事项六部分组成。本报告所列数据的统计期限自2025年1月1日至2025年12月31日止，主要通过南山区人民政府网站公布。","tags":[]},{"id":"szns_qyfw--7546595333684193232","title":"深圳市南山区促进产业高质量发展专项资金2025年资助情况","link":"https://www.szns.gov.cn/nsqqyfzfwzx/gkmlpt/content/12/12584/post_12584623.html","date":"2026-01-05","sourceId":"szns_qyfw","source":"南山区企业服务中心","summary":"2025年1月1日至2025年12月31日，深圳市南山区企业发展服务中心组织召开南山区促进产业高质量发展专项资金领导小组会议4次。全区全年共安排促进产业高质量发展专项资金项目6436项，惠及企业3359家。","tags":["资金支持"]},{"id":"szns_gxj-1560756681112677064","title":"南山区工业和信息化局2025年法治政府建设年度报告","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12583/post_12583638.html","date":"2026-01-04","sourceId":"szns_gxj","source":"南山区工信局","summary":"2025年，在区委、区政府的坚强领导和区委全面依法治区委员会办公室的有力指导下，区工信局坚持以习近平新时代中国特色社会主义思想为指导，深入践行习近平法治思想，全面贯彻落实党的二十大和二十届二中全会、二十届三中全会、二十届四中全会精神，紧紧围绕相关会议精神与部署要求履行职责，持续提升依法行政水平。现将2025年我局法治政府建设情况与下一年度工作安排报告如下： 一、强化理论武装，筑牢法治建设思想根基 （一）深入学习贯彻党的二十大精神和习近平法治思想 区工信局高度重视法治政府建设工作，坚持深入学习贯彻党的二十大和二十届二中、三中、四中全会精神，深刻把握习近平法治思想和习近平总书记系列重要讲话重要指示…","tags":[]},{"id":"szns_kcj--3444332995546744863","title":"深圳市南山区科技创新局2025年法治政府建设工作报告","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12582/post_12582570.html","date":"2026-01-04","sourceId":"szns_kcj","source":"南山区科创局","summary":"2025年，区科创局坚持以习近平新时代中国特色社会主义思想为指导，深入学习贯彻习近平法治思想，全面贯彻落实党的二十大和二十届二中、三中、四中全会精神，严格按照《法治政府建设实施纲要（2021-2025年）》及省、市相关部署，在区委区政府的坚强领导下，切实抓好法治政府建设各项工作，不断健全科技创新领域法规制度体系，全面提升依法行政水平，为南山区加快实现高水平科技自立自强提供了坚实的法治保障。现将全年工作情况报告如下。 一、2025年度推进法治政府建设的主要举措与成效 （一）提高政治站位，坚决履行法治建设主体责任。一是强化组织领导，完善工作机制。","tags":[]},{"id":"szns_kcj--6447177860571351705","title":"关于南山区“模力营”空间支持行动拟立项资助名单公示","link":"https://www.szns.gov.cn/nsqkcj/gkmlpt/content/12/12582/post_12582169.html","date":"2026-01-04","sourceId":"szns_kcj","source":"南山区科创局","summary":"根据《“模力营”空间支持行动操作规程》要求，现对申报南山区“模力营”空间支持行动的4个项目予以公示，公示时间：2025年12月31日-2026年1月9日。在此期间，对公示名单有异议的单位或个人，可填写意见反馈表向我局反映（电子邮箱cyzx@szns.gov.cn），请提供真实身份和联系方式(单位请加盖单位公章,个人请署真实姓名,匿名反映不予受理)。","tags":[]},{"id":"szns_gxj-8947803412199636547","title":"关于2025年四季度“流量券”广告服务商遴选结果的公示","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12581/post_12581266.html","date":"2025-12-31","sourceId":"szns_gxj","source":"南山区工信局","summary":"各有关单位： 根据《关于公开遴选2025年四季度“流量券”广告服务商的通知》，按照公正、公平、公开原则，经企业申报、内部评审等环节，现将2025年四季度“流量券”广告服务商遴选结果公布如下： 一、腾讯广告服务商 单位详细名称 深圳市东信时代信息技术有限公司 深圳小森互娱有限公司 开域国际控股有限公司 深圳市亿科数字科技有限公司 深圳市骐量科技有限公司 深圳云盟互动网络技术有限公司 深圳赞道网络科技有限公司 深圳我买家网络科技有限公司 深圳市厚拓科技有限公司 上海盟聚信息科技有限公司&上海盟耀信息科技有限公司 （含受同一企业控股的关联公司——深圳微盟信息科技有限公司） 上海小牛畅连数字科技有限公…","tags":[]},{"id":"zxqyj--4079865668550619408","title":"深圳市中小企业服务局关于“链式”中小企业数字化转型产品和服务支持项目名单的通知","link":"https://zxqyj.sz.gov.cn/zwgk/zfxxgkml/tzgg/content/post_12577359.html","date":"2025-12-30","sourceId":"zxqyj","source":"深圳市中小企业服务局","summary":"各有关单位： 为深入贯彻落实国家关于支持中小企业创新发展、加快中小企业数字化转型系列决策部署，根据《财政部 工业和信息化部关于开展中小企业数字化转型城市试点工作的通知》（财建〔2023〕117号）要求,我局于2025年7月发布了《2025年深圳市中小企业数字化转型城市试点“链式”中小企业数字化转型产品和服务支持项目申报指南》，通过遴选一批具有示范带动作用的“链式”中小企业数字化转型产品和服务支持项目，进一步推动我市大中小企业融通发展与产业链上下游协同转型。","tags":["企业资质"]},{"id":"szns_gxj--3894937991193314179","title":"关于公开遴选2025年四季度“流量券”广告服务商报名延期的通知","link":"https://www.szns.gov.cn/nsqjjcjj/gkmlpt/content/12/12567/post_12567974.html","date":"2025-12-25","sourceId":"szns_gxj","source":"南山区工信局","summary":"各企业: 原定于2025年12月24日18:00截止的公开遴选20 te":"2025-10-14","sourceId":"gxj","source":"深圳市工信局","summary":"深工信规〔2025〕8号 第一章 总则 第一条 为加强我市优质中小企业梯度培育管理，提升中小企业创新能力和专业化水平，促进中小企业高质量发展，加快培育新质生产力，根据《优质中小企业梯度培育管理暂行办法》（工信部企业〔2022〕63号，以下简称《暂行办法》），结合本市实际，制定本实施细则。 第二条 优质中小企业是指在产品、技术、管理、模式等方面创新能力强、专注细分市场、成长性好的中小企业，由创新型中小企业、专精特新中小企业和专精特新“小巨人”企业三个层次组成。","tags":["企业资质"]},{"id":"gxj--6710764367649982140","title":"《深圳市工业和信息化局优质中小企业梯度培育管理实施细则》(2025年修订版）政策解读","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12435143.html","date":"2025-10-14","sourceId":"gxj","source":"深圳市工信局","summary":"为进一步完善我市优质中小企业梯度培育工作体系，提升我市专精特新中小企业培育质量，我局对2022年11月印发的《深圳市工业和信息化局优质中小企业梯度培育管理实施细则》（深工信规〔2022〕7号）（以下简称《实施细则》）进行了修订。相关内容解读如下： 一、修订《实施细则》的目的 进一步完善我市中小企业梯度培育工作、提高中小企业创新能力和专业化水平，引导中小企业走专精特新发展道路，持续擦亮专精特新品牌要求，提升我市专精特新企业质量品牌，赋能专精特新企业高质量发展。 二、《实施细则》修订的主要内容 一是进一步优化了梯度培育机制。","tags":["企业资质"]},{"id":"inanshan--592680146380647110","title":"深圳市南山区人民政府关于印发《南山区股份合作公司综合监管办法》的通知","link":"https://www.inanshan.org.cn/ztfw/zcfw/zchj","date":"2025-09-29","sourceId":"inanshan","source":"南山区企业服务","summary":"","tags":[]},{"id":"gxj-5902757571197266199","title":"《深圳市工业和信息化产业发展专项资金管理办法》政策解读","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12418232.html","date":"2025-09-28","sourceId":"gxj","source":"深圳市工信局","summary":"根据《深圳市行政机关规范性文件管理规定》，考虑到《深圳市工业和信息化产业发展专项资金管理办法》（深工信规〔2020〕9号，以下简称2020版《管理办法》）于2025年5月7日到期失效，为更好地规范和加强深圳市工业和信息化产业发展专项资金管理，确保市工业和信息化产业发展专项资金管理有法可依，市工业和信息化局对2020版《管理办法》进行了修订完善，形成《深圳市工业和信息化产业发展专项资金管理办法》（以下简称：《管理办法》），说明如下。 一、基本情况 （一）起草背景。","tags":["资金支持"]},{"id":"gxj--8035329704006866722","title":"深圳市工业和信息化产业发展专项资金管理办法","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12418228.html","date":"2025-09-28","sourceId":"gxj","source":"深圳市工信局","summary":"深工信规〔2025〕6号 目 录 第一章 总则 第二章 职责与义务 第三章 资金使用范围、条件和方式 第四章 项目储备 第五章 预算编制、执行和决算 第六章 绩效管理 第七章 监督管理 第八章 附则 第一章 总 则 第一条 为加强和规范深圳市工业和信息化产业发展专项资金的管理，提高财政专项资金的使用效益，根据《中华人民共和国预算法》和深圳市市级财政专项资金管理有关规定，结合深圳市实际，制定本办法。","tags":["技术领域","资金支持"]},{"id":"commerce--2200128758895152096","title":"深圳 发展的若干措施》（深府办规〔2024〕3号），根据市级财政专项资金管理相关规定，进一步明确各项政策措施的适用对象、申报条件、支持标准等，确保政策公开透明、执行到位，提高专项资金使用效益和管理水平，促进电子商务高质量发展，加快建设具有全球重要影响力的消费中心，结合实际情况，我局制定了《〈深圳市关于推动电子商务加快发展的若干措施〉实施细则》，现予以印发，请遵照执行。","tags":["资金支持"]},{"id":"stic-3318068159703944906","title":"《深圳市中央引导地方科技发展资金管理办法》政策解读","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12283/post_12283859.html","date":"2025-07-17","sourceId":"stic","source":"深圳市科技创新局","summary":"一、修订背景 为贯彻党中央、国务院关于科技创新的重大决策，落实中央科技委员会部署安排，进一步优化完善中央财政对地方转移支付资金管理，提高资金使用效益，根据国家有关法律法规和政策要求，财政部和科技部修订印发了《中央引导地方科技发展资金管理办法》（财教〔2023〕276号）。 二、修订思路 一是 与国家最新政策同步 。 按照要求，调整了支持方式和方向，扩大了经费的使用范围，丰富了项目的资助方式。 二 是 与我市科技政策有效衔接 。 中央引导资金项目的实施，将与我市科技计划项目相关管理规定有效对接，做到项目的同步启动、同步储备、同步管理。","tags":[]},{"id":"stic--1539656966598381486","title":"深圳市科技创新局 深圳市财政局关于印发《深圳市中央引导地方科技发展资金管理办法》的通知","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12283/post_12283857.html","date":"2025-07-17","sourceId":"stic","source":"深圳市科技创新局","summary":"各有关单位： 为进一步优化完善中央引导地方科技发展资金管理，提高资金使用效益，根据《中央引导地方科技发展资金管理办法》（财教〔2023〕276号）相关要求，我们制定了《深圳市中央引导地方科技发展资金管理办法》。现予印发，请遵照执行。 深圳市科技创新局 深圳市财政局 2025年7月12日 深圳市中央引导地方科技发展资金管理办法 第一章 总 则 第一条 为了规范深圳市（含深汕特别合作区，下同）中央引导地方科技发展资金（以下简称中央引导资金）的管理，提高中央引导资金使用效益，根据《中央引导地方科技发展资金管理办法》(财教〔2023〕276号)等有关规定，结合本市实际，制定本办法。","tags":[]},{"id":"stic-7915205013206969560","title":"《深圳市科技创新领域宽容失败履职尽责认定工作指引（试行）》政策解读","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12273/post_12273076.html","date":"2025-07-10","sourceId":"stic","source":"深圳市科技创新局","summary":"为进一步鼓励科研人员积极探索、勇于创新，充分调动和保护科研人员干事创业的积极性、主动性、创造性，营造鼓励创新、支持担当、宽容失败的良好氛围，根据《广东省科技创新条例》《深圳经济特区科技创新条例》以及国家、广东省和深圳市等有关文件精神，结合我市科技创新工作实际，我局起草形成了《深圳市科技创新领域宽容失败履职尽责认定工作指引（试行）》（以下简称《指引》）。 一、起草背景 “鼓励创新，宽容失败”是“深圳十大观念”之一，是深圳人的价值表达，也是深圳这座城市的信念和精神底蕴。近年来，随着我市深入实施创新驱动发展战略，科技创新活动日趋活跃，科技创新领域宽容失败，履职尽责认定机制亟需制度化、规范化。","tags":[]},{"id":"stic--9059068557620440170","title":"深圳市科技创新局关于印发《深圳市科技创新领域宽容失败履职尽责认定工作指引（试行）》的通知","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12273/post_12273068.html","date":"2025-07-10","sourceId":"stic","source":"深圳市科技创新局","summary":"深科创规〔2025〕3号 各有关单位： 为鼓励科研人员大胆探索、挑战未知，营造鼓励创新、支持担当、宽容失败的良好氛围，我局制定了《深圳市科技创新领域宽容失败履职尽责认定工作指引（试行）》，现予印发，请遵照执行。 特此通知。 深圳市科技创新局 2025年7月8日 深圳市科技创新领域宽容失败履职尽责认定工作指引（试行） 为进一步鼓励科研人员积极探索、勇于创新，充分调动和保护科研人员干事创业的积极性、主动性、创造性，营造鼓励创新、支持担当、宽容失败的良好氛围，根据《广东省科技创新条例》《深圳经济特区科技创新条例》以及国家、广东省和深圳市等有关文件精神，结合我市科技创新工作实际，特制定本工作指引。","tags":[]},{"id":"fgw--3540180103467773003","title":"深圳市发展和改革委员会关于《深圳市发展和改革委员会中央预算内投资项目事中事后监督管理暂行办法》续期的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12227021.html","date":"2025-06-13","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2025〕8号 各有关单位： 经研究，现决定对《深圳市发展和改革委员会中央预算内投资项目事中事后监督管理暂行办法》续期3年，有效期至2028年6月14日，请遵照执行。 特此通知。 深圳市发展和改革委员会 2025年6月4日 深圳市发展和改革委员会中央预算内投资项目 事中事后监督管理暂行办法 第一章 总 则 第一条 为进一步规范和加强深圳市中央预算内投资项目事中事后监督管理，提高中央预算内资金使用效益，依据《中央预算内投资补助和贴息项目管理办法》（国家发展改革委令第45号）、《中央预算内投资项目监督管理办法》（国家发展改革委令第10号）等规定，制定本办法。","tags":[]},{"id":"commerce--6163106176558609368","title":"深圳市商务局关于修订《深圳市现代商贸流通体系试点城市建设专项资金管理办法》第八条的补充通知","link":"https://commerce.sz.gov.cn/xxgk/zcfgjzcjd/zcfg/content/post_12214680.html","date":"2025-06-06","sourceId":"commerce","source":"深圳市商务局","summary":"深商务规〔2025〕2号 各有关单位： 经研究，对《深圳市现代商贸流通体系试点城市建设专项资金管理办法》（深商务规〔2024〕3号，以下简称《管理办法》）第八条作出修订，现补充通知如下： 一、将《管理办法》第八条第九款修改为“申报项目如有土建内容的，应符合项目备案（核准）、环评、规划、土地、工程及建设等相关建设要求。项目涉及的土地、建设场所为租赁的，租赁期应覆盖项目建设周期，并提供房屋租赁合同或租赁场所真实有效的其他佐证材料。” 二、本通知自2025年6月6日起施行，有效期至2027年12月5日。","tags":["资金支持"]},{"id":"fgw-4693865591062325531","title":"深圳市推出39条工作措施 全力以赴提振消费","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12216107.html","date":"2025-06-06","sourceId":"fgw","source":"深圳市发改委","summary":"《深圳市提振消费专项行动实施方案》已经深圳市委、市政府同意并正式印发。全文如下： 深圳市提振消费专项行动实施方案 为深入贯彻落实中央和省关于提振消费的部署要求，全方位扩大消费需求、繁荣消费市场，加快建设具有全球重要影响力的消费中心，现制定如下实施方案。 一、提升居民消费能力和意愿 （一）实施居民增收促进行动 1．促进高质量充分就业。持续开展“百万英才汇南粤”等招聘活动，对符合条件的来深就业本科生、硕士研究生、博士研究生分别给予最高3万元、5万元、10万元补贴。聚焦重点领域、重点群体开展职业技能培训，2025年发放各类职业技能培训补贴6万人次以上。","tags":["资金支持"]},{"id":"fgw-1935484902710970812","title":"深圳市发展和改革委员会关于印发《深圳市公共资源交易专家库及专家管理办法》的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12212043.html","date":"2025-06-05","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2025〕6号 各有关单位： 经市政府同意，现将《深圳市公共资源交易专家库及专家管理办法》印发给你们，请遵照执行。 特此通知。 深圳市发展和改革委员会 2025年5月29日 深圳市公共资源交易专家库及专家管理办法 第一章 总 则 第一条 为加强深圳市公共资源交易专家库的建设和管理，深化公共资源交易各领域专家资源的整合共享，根据《中华人民共和国招标投标法》《中华人民共和国政府采购法》《评标专家和评标专家库管理办法》《政府采购评审专家管理办法》等有关规定，结合实际，制定本办法。","tags":[]},{"id":"fgw-4844819372819016653","title":"深圳市发展和改革委员会关于印发《深圳市公共资源交易管理办法》的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12211531.html","date":"2025-06-05","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2025〕7号 各有关单位： 经市政府同意，现将《深圳市公共资源交易管理办法》印发给你们，请遵照执行。 特此通知。 深圳市发展和改革委员会 2025年5月30日 深圳市公共资源交易管理办法 第一章 总 则 第一条 为规范深圳市公共资源交易活动，建立统一开放、竞争有序、服务高效、监管有力的公共资源交易市场体系，推动公共资源交易高质量、健康可持续发展，根据《中华人民共和国招标投标法》《中华人民共和国政府采购法》《公共资源交易平台管理暂行办法》等有关法律法规规章，结合本市实际，制定本办法。 第二条 本办法适用于深圳市各类公共资源交易活动以及市公共资源交易平台的建设、运行和管理。","tags":[]},{"id":"fgw-1961097325362519338","title":"深圳市发展和改革委员会 深圳市财政局关于印发《深圳市市级政策性粮食购销违法违规行为举报奖励实施细则（试行）》的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12180362.html","date":"2025-05-16","sourceId":"fgw","source":"深圳市发改委","summary":"各有关单位： 为鼓励社会公众积极举报市级政策性粮食购销违法违规行为，动员社会力量参与市级政策性粮食购销领域监督，经研究，现印发《深圳市市级政策性粮食购销违法违规行为举报奖励实施细则（试行）》，请遵照执行。 深圳市发展和改革委员会 深圳市财政局 2025年5月14日 深圳市市级政策性粮食购销违法违规行为举报奖励实施细则（试行） 第一条 为鼓励社会公众积极举报市级政策性粮食购销违法违规行为，动员社会力量参与市级政策性粮食购销领域监督，根据《中华人民共和国粮食安全保障法》《粮食流通管理条例》《广东省粮食安全保障条例》及《政策性粮食购销违法违规行为举报奖励办法（试行）》（国粮执法规〔2023〕144号…","tags":[]},{"id":"gxj--2974483105014307855","title":"图解：《深圳市极速宽带先锋城市2025年行动计划》政策解读","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12146996.html","date":"2025-04-27","sourceId":"gxj","source":"深圳市工信局","summary":"","tags":[]},{"id":"gxj--5770480683078182230","title":"深圳市极速宽带先锋城市2025年行动计划","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12146992.html","date":"2025-04-27","sourceId":"gxj","source":"深圳市工信局","summary":"为加快推进全市新型信息基础设施建设，根据《“十四五”信息通信行业发展规划》（工信部规〔2021〕164号）《算力基础设施高质量发展行动计划》（工信部联通信〔2023〕180号）《深圳市推进新型信息基础设施建设行动计划（2022—2025年）》（深府办函〔2022〕14号）《深圳市支持新型信息基础设施建设的若干措施》（深府办函〔2022〕104号）《深圳市算力基础设施高质量发展行动计划（2024—2025）》（深工信〔2023〕300号）等文件精神，制定本行动计划。","tags":["技术领域"]},{"id":"stic-3520691746680188970","title":"深圳市科技创新局关于印发《深圳鲲鹏青年创新创业项目管理办法》的通知","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12134/post_12134324.html","date":"2025-04-18","sourceId":"stic","source":"深圳市科技创新局","summary":"深科创规〔2025〕2 号 各有关单位： 为进一步增强深圳对全球青年创新创业人才的号召力和吸引力，有效实施鲲鹏青年创新创业行动，根据国家和省市有关规定，我局制定了《深圳鲲鹏青年创新创业项目管理办法》。现予印发，请遵照执行。 深圳市科技创新局 2025年4月18日 深圳鲲鹏青年创新创业项目管理办法 第一章 总则 第一条 为贯彻落实党的二十届三中全会精神，进一步增强深圳对全球青年创新创业人才的号召力和吸引力，提升创新创业能级，有效实施鲲鹏青年创新创业行动，根据国家、广东省有关规定，结合我市实际，制定本办法。","tags":[]},{"id":"stic--8634602933112875688","title":"《深圳鲲鹏青年创新创业项目管理办法》政策解读","link":"https://stic.sz.gov.cn/gkmlpt/content/12/12134/post_12134223.html","date":"2025-04-18","sourceId":"stic","source":"深圳市科技创新局","summary":"一、起草背景 为贯彻落实党的二十届三中全会精神，进一步增强深圳对全球青年创新创业人才的号召力和吸引力，提升创新创业能级，有效实施鲲鹏青年创新创业行动，根据国家、广东省有关规定，结合我市实际，制定《深圳鲲鹏青年创新创业项目管理办法》（以下简称《办法》）。 《办法》起草过程中，广泛征求市委市政府相关部门、各区、市属高校等79家单位意见建议，并结合市领导专题会议精神，经过系统研究和反复论证，最终形成本《办法》。 二、基本思路 （一）注重吸引有力 鲲鹏青年创新创业项目（以下简称鲲鹏青年项目）以奖励资助或事后资助的方式支持大学生和青年来深圳，助力实现创新创业梦想。","tags":[]},{"id":"commerce--3036707182987529581","title":"深圳市商务局关于印发《深圳市直播电商基地（园区）认定管理办法》的通知","link":"https://commerce.sz.gov.cn/xxgk/zcfgjzcjd/zcfg/content/post_12131006.html","date":"2025-04-17","sourceId":"commerce","source":"深圳市商务局","summary":"深商务规〔2025〕1号 各有关单位： 为充分发挥直播电商基地（园区）产业集聚效应，构建良好产业发展生态，推动我市直播电商高质量发展，根据《深圳市关于推动电子商务加快发展的若干措施》（深府办规〔2024〕3号）、《深圳市推进直播电商高质量发展行动方案（2023－2025年）》（深商务电商字〔2023〕9号）等政策文件，市商务局结合我市实际研究制定了《深圳市直播电商基地（园区）认定管理办法》。现予印发，请遵照执行。","tags":[]},{"id":"gxj--8632556834024295006","title":"《深圳市工业和信息化局自愿性清洁生产管理实施细则》政策解读","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12129490.html","date":"2025-04-16","sourceId":"gxj","source":"深圳市工信局","summary":"为全面推行工信领域清洁生产，规范管理自愿性清洁生产审核验收工作，助力制造业绿色高质量发展，近日，深圳市工业和信息化局印发了《深圳市工业和信息化局自愿性清洁生产管理实施细则》（以下简称《实施细则》）。为更好理解和实施《实施细则》，现解读如下。 一、《实施细则》背景及意义 推行清洁生产是贯彻落实节约资源和保护环境基本国策的重要举措，是推进生态文明建设、推动减污降碳协同增效的重要手段，也是加快形成绿色生产生活方式、促进经济社会全面绿色转型和高质量发展的有效途径。党的二十大报告指出，必须牢固树立和践行绿水青山就是金山银山的理念，站在人与自然和谐共生的高度谋划发展。","tags":[]},{"id":"gxj--7632499736869428837","title":"深圳市工业和信息化局自愿性清洁生产管理实施细则","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12129471.html","date":"2025-04-16","sourceId":"gxj","source":"深圳市工信局","summary":"深工信规〔2025〕5号 第一章 总则 第一条 为全面推行企业清洁生产，规范清洁生产审核行为，指导自愿性清洁生产审核验收工作，加快形成绿色生产方式，根据《中华人民共和国清洁生产促进法》《清洁生产审核办法》（国家发展和改革委员会、环境保护部令第38号），结合深圳实际，制定本细则。 第二条 本细则适用于深圳市（含深汕特别合作区，下同）内从事生产和服务活动的单位以及从事相关管理活动的部门实施的工业和信息化领域自愿性清洁生产管理有关工作。","tags":[]},{"id":"fgw--8426044536364622309","title":"深圳市发展和改革委员会关于《深圳市市级储备冻猪肉管理办法》续期的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12122899.html","date":"2025-04-14","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2025〕4号 各有关单位： 经研究，《深圳市市级储备冻猪肉管理办法》有效期续期3年，请遵照执行。 特此通知。 附件：深圳市市级储备冻猪肉管理办法 深圳市发展和改革委员会 2025年4月2日 深圳市市级储备冻猪肉管理办法 第一章 总则 第一条 为加强对市级储备冻猪肉的管理，确保数量真实、质量合格和储存安全，做到储得进、管得好、调得动、用得上，参照《中央储备肉管理办法》，结合本市实际，制定本办法。 第二条 本办法所称市级储备冻猪肉，是指市政府为缓解猪肉市场价格异常波动，应对突发事件而储备的符合GB/T9959.3-2019标准的冻猪肉。","tags":[]},{"id":"fgw--6866911810339757326","title":"深圳市发展和改革委员会 深圳市卫生健康委员会 深圳市市场监督管理局 深圳市医疗保障局关于印发《深圳市全链条支持医药和医疗器械发展若干措施》的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_12110363.html","date":"2025-04-07","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2025〕3号 各有关单位： 《深圳市全链条支持医药和医疗器械发展若干措施》已经市政府同意，现予以印发，请遵照执行。 特此通知。 深圳市发展和改革委员会 深圳市卫生健康委员会 深圳市市场监督管理局 深圳市医疗保障局 2025年4月2日 深圳市全链条支持医药和医疗器械发展若干措施 为深入贯彻落实党的二十大和二十届二中、三中全会精神，以及国家、省关于发展医药和医疗器械产业的一系列决策部署，充分发挥深圳科技创新、先进制造、深港合作等优势，大力发展医药和医疗器械研发经济，全链条支持医药和医疗器械产业快速发展做大做强，将深圳建设成为国内领先、国际一流的医药和医疗器械产业集聚发展高地，制定以下措…","tags":[]},{"id":"inanshan--592680146380647110","title":"深圳市南山区人民政府关于印发《南山区支持创新创业“六个一”行动方案》的通知","link":"https://www.inanshan.org.cn/ztfw/zcfw/zchj","date":"2025-03-25","sourceId":"inanshan","source":"南山区企业服务","summary":"","tags":[]},{"id":"gxj-1605506503943811615","title":"图解：《深圳市工业和信息化局智能终端产业发展扶持计划操作规程》","link":"https://gxj.sz.gov.cn/xxgk/xxgkml/zcfgjzcjd/content/post_12081939.html","date":"2025-03-20","sourceId":"gxj 案》（以下简称《实施方案》），解读如下。 一、背景情况 科技伦理是开展科学研究、技术开发等科技活动需要遵循的价值理念和行为规范，是促进科技事业健康发展的重要保障。党中央、国务院高度重视科技伦理治理工作，习近平总书记多次对科技伦理工作作出重要指示。自2019年以来，先后成立国家科技伦理委员会、印发《关于加强科技伦理治理的意见》、发布《科技伦理审查办法（试行）》。","tags":[]},{"id":"stic--8618569372854291609","title":"深圳市人民政府办公厅印发深圳市关于加强科技伦理治理的实施方案的通知","link":"https://stic.sz.gov.cn/gkmlpt/content/11/11968/post_11968025.html","date":"2025-01-20","sourceId":"stic","source":"深圳市科技创新局","summary":"深府办函〔2024〕72 号 各区人民政府，市有关单位： 《深圳市关于加强科技伦理治理的实施方案》已经市政府同意，现印发给你们，请认真组织实施。实施过程中遇到的问题，请径向市科技创新局反映。 市政府办公厅 2024年11月9日 深圳市关于加强科技伦理治理的实施方案 为贯彻落实中共中央办公厅、国务院办公厅《关于加强科技伦理治理的意见》和科技部等十部委联合印发的《科技伦理审查办法（试行）》以及省政府办公厅《关于加强科技伦理治理的实施方案》，健全我市科技创新体制机制，规范科技伦理治理，防范科技伦理风险，保障科技创新高质量发展和高水平安全良性互动，结合我市实际，制定本方案。","tags":[]},{"id":"commerce-4057044427014691678","title":"深圳市投资促进局关于印发《深圳市投资促进局利用外资奖励计划实施细则》的通知","link":"https://commerce.sz.gov.cn/xxgk/zcfgjzcjd/zcfg/content/post_11959968.html","date":"2025-01-15","sourceId":"commerce","source":"深圳市商务局","summary":"深投促规〔2025〕1号 各有关单位： 为贯彻落实《深圳市进一步加大吸引和利用外资实施办法》（深府规〔2024〕6号），进一步明确各项政策措施的适用对象、申报条件、支持标准等，确保政策公开透明、执行到位，提高专项资金使用效益和管理水平，更大力度吸引和利用外资，结合实际情况，我局制定了《深圳市投资促进局利用外资奖励计划实施细则》，现予以印发，请遵照执行。","tags":["资金支持"]},{"id":"commerce--6655205986817662515","title":"深圳市人民政府办公厅关于印发深圳市关于推动电子商务加快发展的若干措施的通知","link":"https://commerce.sz.gov.cn/xxgk/zcfgjzcjd/zcfg/content/post_11957365.html","date":"2025-01-14","sourceId":"commerce","source":"深圳市商务局","summary":"深府办规〔2024〕3号 各区人民政府，市有关单位： 《深圳市关于推动电子商务加快发展的若干措施》已经市政府同意，现予印发，请遵照执行。执行中遇到的问题，请径向市商务局反映。 深圳市人民政府办公厅 2024年12月13日 深圳市关于推动电子商务加快发展的若干措施 为全面贯彻落实党的二十大和二十届二中、三中全会精神，深入贯彻落实习近平总书记对广东、深圳系列重要讲话和重要指示精神，贯彻落实中央、省关于发展数字经济总体部署、扩大内需战略规划，加快打造更具全球影响力的经济中心城市和现代化国际大都市，加快建设具有全球重要影响力的消费中心，围绕电子商务连接线上线下、衔接产销两端、扩大内需拉动消费、对接国内…","tags":[]},{"id":"inanshan--592680146380647110","title":"深圳市南山区人民政府办公室关于再次延长《南山区股份合作公司综合监管实施办法（试行）》有效期的通知","link":"https://www.inanshan.org.cn/ztfw/zcfw/zchj","date":"2025-01-13","sourceId":"inanshan","source":"南山区企业服务","summary":"","tags":[]},{"id":"stic-2641788454623045771","title":"《深圳市科技研发资金管理办法》政策解读", 验室管理办法》的通知","link":"https://stic.sz.gov.cn/gkmlpt/content/11/11830/post_11830572.html","date":"2024-11-28","sourceId":"stic","source":"深圳市科技创新局","summary":"深科创规〔2024〕2号 各有关单位： 为进一步优化完善我市重点实验室体系，扎实推进深圳市重点实验室、在深广东省重点实验室和在深全国重点实验室建设，规范运行管理，持续提升发展能级，促进科技成果转化，加快发展新质生产力，支撑我市科技创新“硬核力”、产业体系“竞争力”不断提升，根据国家和省市有关规定，结合我市科技创新载体建设的实际，我局制定了《深圳市重点实验管理办法》，现予印发，请遵照执行。","tags":[]},{"id":"stic--7920700350818938244","title":"《深圳市重点实验室管理办法》政策解读","link":"https://stic.sz.gov.cn/gkmlpt/content/11/11830/post_11830480.html","date":"2024-11-28","sourceId":"stic","source":"深圳市科技创新局","summary":"","tags":[]},{"id":"fgw--2097273013366674530","title":"深圳市发展和改革委员会关于印发《深圳市关于促进绿色消费增长的若干措施》的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_11822510.html","date":"2024-11-27","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2024〕7号 各有关单位： 《深圳市关于促进绿色消费增长的若干措施》已经市政府同意，现印发给你们，请认真贯彻执行。 特此通知。 深圳市发展和改革委员会 2024年11月20日 深圳市关于促进绿色消费增长的若干措施 绿色消费是各类消费主体在消费活动全过程贯彻绿色低碳理念的消费行为。为深入贯彻落实党的二十大和二十届二中、三中全会精神及《中共中央 国务院关于加快经济社会发展全面绿色转型的意见》，落实我市加快服务业高质量发展大会关于大力发展绿色消费要求，进一步加强绿色消费对经济高质量发展的支撑作用，制定以下措施。 一、促进重点领域消费绿色转型 （一）推进食品消费绿色化。","tags":[]},{"id":"fgw-3466306157024082554","title":"深圳市发展和改革委员会关于印发《深圳市公共资源交易目录（2024年版）》的通知","link":"https://fgw.sz.gov.cn/zwgk/zcjzcjd/zc/content/post_11723754.html","date":"2024-11-14","sourceId":"fgw","source":"深圳市发改委","summary":"深发改规〔2024〕6号 各有关单位： 根据《国家发展改革委关于修订印发<全国公共资源交易目录指引>的通知》（发改法规〔2023〕1551号）及《广东省政务服务和数据管理局关于调整实行广东省公共资源交易目录（2024年版）的通知》（粤政数〔2024〕3号），为进一步提高公共资源配置效率，优化明确公共资源交易范围，市发展改革委会同有关单位对《深圳市公共资源交易目录（2021年版）》进行了修订调整，形成了《深圳市公共资源交易目录（2024年版）》（以下简称《目录》）。","tags":[]},{"id":"stic--9166095200876708084","title":"《深圳市关于进一步促进科技成果产业化若干措施》解读","link":"https://stic.sz.gov.cn/gkmlpt/content/11/11694/post_11694575.html","date":"2024-11-04","sourceId":"stic","source":"深圳市科技创新局","summary":"","tags":[]},{"id":"stic-5899349045681921480","title":"多项规定全国首创！《深圳经济特区科技创新条例》","link":"https://stic.sz.gov.cn/gkmlpt/content/11/11694/post_11694532.html","date":"2024-11-04","sourceId":"stic","source":"深圳市科技       const data = window.POLICY_DATA;

      const state = {
        filters: {
          search: '',
          sources: data.sources.map(s => s.id),
          tag: 'all',
          dateRange: 'all',
          customStart: '',
          customEnd: '',
        },
        sort: 'desc',
        pagination: {
          page: 1,
          pageSize: 20,
        },
      };

      function debounce(fn, ms) {
        let t;
        return function(...args) {
          clearTimeout(t);
          t = setTimeout(() => fn.apply(this, args), ms);
        };
      }

      function formatDateLabel(range) {
        const map = { 'all': '全部时间', '7d': '近7天', '30d': '近30天', '90d': '近90天', 'custom': '自定义' };
        return map[range] || range;
      }

      function getFilteredPolicies() {
        return data.policies.filter(p => {
          if (!state.filters.sources.includes(p.sourceId)) return false;
          if (state.filters.tag !== 'all' && !p.tags.includes(state.filters.tag)) return false;
          if (state.filters.dateRange !== 'all') {
            const policyDate = new Date(p.date + 'T00:00:00');
            const now = new Date();
            if (state.filters.dateRange === 'custom') {
              if (state.filters.customStart && policyDate < new Date(state.filters.customStart + 'T00:00:00')) return false;
              if (state.filters.customEnd && policyDate > new Date(state.filters.customEnd + 'T23:59:59')) return false;
            } else {
              const days = { '7d': 7, '30d': 30, '90d': 90 }[state.filters.dateRange];
              const cutoff = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
              cutoff.setHours(0,0,0,0);
              if (policyDate < cutoff) return false;
            }
          }
          if (state.filters.search) {
            const q = state.filters.search.toLowerCase();
            const text = (p.title + ' ' + p.source + ' ' + p.summary + ' ' + p.tags.join(' ')).toLowerCase();
            if (!text.includes(q)) return false;
          }
          return true;
        }).sort((a, b) => {
          const da = new Date(a.date + 'T00:00:00'), db = new Date(b.date + 'T00:00:00');
          return state.sort === 'desc' ? db - da : da - db;
        });
      }

      function renderStats() {
        const badgeContainer = document.getElementById('source-badges');
        badgeContainer.innerHTML = '';
        data.sources.forEach(s => {
          const count = data.policies.filter(p => p.sourceId === s.id).length;
          if (count > 0) {
            const badge = document.createElement('span');
            badge.className = 'inline-flex items-center px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-700 border border-gray-200';
            badge.textContent = s.name + ' ' + count;
            badgeContainer.appendChild(badge);
          }
        });
      }

      function renderSourceDropdown() {
        const container = document.getElementById('source-options');
        container.innerHTML = '';
        data.sources.forEach(s => {
          const label = document.createElement('label');
          label.className = 'flex items-center gap-2 px-3 py-2 hover:bg-gray-50 cursor-pointer rounded';
          label.innerHTML = `<input type="checkbox" value="${s.id}" class="source-checkbox w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" ${state.filters.sources.includes(s.id) ? 'checked' : ''}> <span class="text-sm text-gray-700">${s.name}</span>`;
          const checkbox = label.querySelector('input');
          checkbox.addEventListener('change', (e) => {
            const val = e.target.value;
            if (e.target.checked) {
              if (!state.filters.sources.includes(val)) state.filters.sources.push(val);
            } else {
              state.filters.sources = state.filters.sources.filter(id => id !== val);
            }
            state.pagination.page = 1;
            renderAll();
          });
          container.appendChild(label);
        });
      }

      function renderTagDropdown() {
        const container = document.getElementById('tag-options');
        container.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'tag-option w-full text-left px-3 py-2 rounded text-sm ' + (state.filters.tag === 'all' ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
        allBtn.textContent = '全部标签';
        allBtn.dataset.value = 'all';
        container.appendChild(allBtn);
        data.allTags.forEach(tag => {
          const btn = document.createElement('button');
          btn.className = 'tag-option w-full text-left px-3 py-2 rounded text-sm ' + (state.filters.tag === tag ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
          btn.textContent = tag;
          btn.dataset.value = tag;
          container.appendChild(btn);
        });
      }

      function renderActiveFilters() {
        const container = document.getElementById('active-filters');
        const list = document.getElementById('active-filters-list');
        list.innerHTML = '';
        let hasAny = false;

        if (state.filters.search) {
          hasAny = true;
          list.appendChild(createFilterTag('搜索: ' + state.filters.search, () => { state.filters.search = ''; document.getElementById('search-input').value = ''; renderAll(); }));
        }
        const isPartialSourceFilter = state.filters.sources.length > 0 && state.filters.sources.length < data.sources.length;
        if (isPartialSourceFilter) {
          hasAny = true;
          const sourceNames = state.filters.sources.map(id => {
            const s = data.sources.find(x => x.id === id);
            return s ? s.name : id;
          });
          list.appendChild(createFilterTag('来源: ' + sourceNames.join('、'), () => {
            state.filters.sources = data.sources.map(s => s.id);
            renderSourceDropdown();
            renderAll();
          }));
        }
        if (state.filters.tag !== 'all') {
          hasAny = true;
          list.appendChild(createFilterTag('标签: ' + state.filters.tag, () => { state.filters.tag = 'all'; renderTagDropdown(); renderAll(); }));
        }
        if (state.filters.dateRange !== 'all') {
          hasAny = true;
          let label = formatDateLabel(state.filters.dateRange);
          if (state.filters.dateRange === 'custom' && (state.filters.customStart || state.filters.customEnd)) {
            label += ' (' + (state.filters.customStart || '') + ' ~ ' + (state.filters.customEnd || '') + ')';
          }
          list.appendChild(createFilterTag(label, () => { state.filters.dateRange = 'all'; document.getElementById('custom-start').value = ''; document.getElementById('custom-end').value = ''; renderAll(); }));
        }

        container.classList.toggle('hidden', !hasAny);
        const sourceBadge = document.getElementById('source-badge');
        sourceBadge.textContent = state.filters.sources.length;
        sourceBadge.classList.toggle('hidden', !isPartialSourceFilter);
        const tagBadge = document.getElementById('tag-badge');
        tagBadge.textContent = state.filters.tag === 'all' ? '0' : '1';
        tagBadge.classList.toggle('hidden', state.filters.tag === 'all');
      }

      function createFilterTag(text, onRemove) {
        const span = document.createElement('span');
        span.className = 'inline-flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded-full';
        span.innerHTML = `<span>${text}</span><button class="hover:text-blue-900 leading-none" aria-label="移除"><i class="fa fa-times"></i></button>`;
        span.querySelector('button').addEventListener('click', onRemove);
        return span;
      }

      function renderPolicyList() {
        const filtered = getFilteredPolicies();
        const sorted = filtered;
        const pageSize = state.pagination.page * state.pagination.pageSize;
        const paginated = sorted.slice(0, pageSize);
        const hasMore = sorted.length > paginated.length;

        const listEl = document.getElementById('policy-list');
        listEl.innerHTML = '';

        document.getElementById('result-count').textContent = `共 ${sorted.length} 条`;
        document.getElementById('empty-state').classList.toggle('hidden', paginated.length > 0);
        document.getElementById('load-more-container').classList.toggle('hidden', !hasMore);

        if (paginated.length === 0) return;

        paginated.forEach(item => {
          const li = document.createElement('li');
          li.className = 'px-4 sm:px-6 py-4 hover:bg-gray-50 transition';
          const summary = item.summary || '';
          const summaryHtml = summary ? `<p class="text-sm text-slate-600 line-clamp-2 sm:line-clamp-3 mt-1">${escapeHtml(summary)}</p>` : '';
          const tagsHtml = (item.tags && item.tags.length) ? `<div class="flex flex-wrap gap-1 mt-1">${item.tags.map(t => `<span class="tag-pill cursor-pointer inline-flex items-center px-2 py-0.5 rounded text-xs bg-emerald-50 text-emerald-700 border border-emerald-100 hover:bg-emerald-100 transition" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('')}</div>` : '';
          li.innerHTML = `
            <div class="flex flex-col gap-1">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-1 sm:gap-2">
                <a href="${item.link}" target="_blank" class="text-base font-medium text-slate-800 hover:text-blue-600 transition line-clamp-2">${escapeHtml(item.title)}</a>
                <span class="text-sm text-slate-400 whitespace-nowrap shrink-0">${item.date}</span>
              </div>
              <div class="flex items-center gap-2 text-sm">
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-blue-50 text-blue-700 border border-blue-100">${escapeHtml(item.source)}</span>
              </div>
              ${summaryHtml}
              ${tagsHtml}
            </div>
          `;
          listEl.appendChild(li);
        });
        // Bind tag click events
        listEl.querySelectorAll('.tag-pill').forEach(pill => {
          pill.addEventListener('click', () => {
            state.filters.tag = pill.dataset.tag;
            state.pagination.page = 1;
            renderTagDropdown();
            renderAll();
          });
        });
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function renderAll() {
        renderStats();
        renderActiveFilters();
        renderPolicyList();
      }

      function showToast(message, type = 'success') {
        let toast = document.getElementById('page-toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.id = 'page-toast';
          toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg text-sm font-medium z-50 transition-opacity duration-300 opacity-0';
          document.body.appendChild(toast);
        }
        toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg text-sm font-medium z-50 transition-opacity duration-300 ' + (type === 'success' ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white');
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2500);
      }

      async function refreshFromRSS() {
        const icon = document.getElementById('refresh-icon');
        icon.classList.add('fa-spin');
        try {
          const res = await fetch(data.rssLink + '?t=' + Date.now());
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const xmlText = await res.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(xmlText, 'application/xml');
          const parserError = doc.querySelector('parsererror');
          if (parserError) throw new Error('XML parse error');

          const sourceNameToId = {};
          data.sources.forEach(s => sourceNameToId[s.name] = s.id);

          const items = Array.from(doc.querySelectorAll('item'));
          const policies = [];
          const allTags = new Set();

          items.forEach(item => {
            const title = item.querySelector('title')?.textContent?.trim() || '';
            const link = item.querySelector('link')?.textContent?.trim() || '';
            const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
            const description = item.querySelector('description')?.textContent?.trim() || '';
            const sourceName = item.querySelector('source')?.textContent?.trim() || '';

            let summary = '';
            const brIdx = description.indexOf('<br/>');
            if (brIdx !== -1) {
              summary = description.slice(brIdx + 5).trim();
            } else if (description.startsWith('来源:')) {
              const lines = description.split(/[\n\r]+/);
              summary = lines.slice(1).join(' ').trim();
            } else {
              summary = description;
            }

            const d = new Date(pubDate);
            const dateStr = isNaN(d) ? '' : d.toISOString().slice(0, 10);

            const tags = Array.from(item.querySelectorAll('category')).map(c => c.textContent.trim()).filter(Boolean);
            tags.forEach(t => allTags.add(t));

            policies.push({
              id: link + '-' + hashCode(title),
              title,
              link,
              date: dateStr,
              sourceId: sourceNameToId[sourceName] || '',
              source: sourceName,
              summary,
              tags,
            });
          });

          data.policies = policies;
          data.allTags = Array.from(allTags).sort();
          data.meta.totalCount = policies.length;
          data.meta.updatedAt = new Date().toLocaleString('zh-CN', { hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-');

          state.filters.sources = data.sources.map(s => s.id);
          state.filters.tag = 'all';
          state.filters.dateRange = 'all';
          state.filters.search = '';
          state.pagination.page = 1;

          document.getElementById('search-input').value = '';
          document.getElementById('search-clear').classList.add('hidden');
          document.getElementById('custom-start').value = '';
          document.getElementById('custom-end').value = '';

          renderTagDropdown();
          updateDateDropdownUI();
          updateSortDropdownUI();
          renderAll();
          showToast('数据已刷新', 'success');
        } catch (e) {
          console.error(e);
          showToast('刷新失败：' + (e.message || '无法加载 RSS'), 'error');
        } finally {
          icon.classList.remove('fa-spin');
        }
      }

      function hashCode(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          const char = str.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        return hash;
      }

      function bindEvents() {
        const searchInput = document.getElementById('search-input');
        const searchClear = document.getElementById('search-clear');
        const sourceBtn = document.getElementById('source-dropdown-btn');
        const sourcePanel = document.getElementById('source-dropdown-panel');
        const tagBtn = document.getElementById('tag-dropdown-btn');
        const tagPanel = document.getElementById('tag-dropdown-panel');
        const dateBtn = document.getElementById('date-dropdown-btn');
        const datePanel = document.getElementById('date-dropdown-panel');
        const sortBtn = document.getElementById('sort-dropdown-btn');
        const sortPanel = document.getElementById('sort-dropdown-panel');

        function closeAllPanels(except) {
          if (except !== 'source') sourcePanel.classList.add('hidden');
          if (except !== 'tag') tagPanel.classList.add('hidden');
          if (except !== 'date') datePanel.classList.add('hidden');
          if (except !== 'sort') sortPanel.classList.add('hidden');
        }

        searchInput.addEventListener('input', debounce(() => {
          state.filters.search = searchInput.value.trim();
          state.pagination.page = 1;
          searchClear.classList.toggle('hidden', !state.filters.search);
          renderAll();
        }, 200));
        searchClear.addEventListener('click', () => {
          searchInput.value = '';
          state.filters.search = '';
          searchClear.classList.add('hidden');
          state.pagination.page = 1;
          renderAll();
        });

        sourceBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = sourcePanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) sourcePanel.classList.remove('hidden');
        });
        document.getElementById('source-select-all').addEventListener('click', (e) => {
          e.stopPropagation();
          state.filters.sources = data.sources.map(s => s.id);
          renderSourceDropdown();
          state.pagination.page = 1;
          renderAll();
        });
        document.getElementById('source-clear').addEventListener('click', (e) => {
          e.stopPropagation();
          state.filters.sources = [];
          renderSourceDropdown();
          state.pagination.page = 1;
          renderAll();
        });

        tagBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = tagPanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) tagPanel.classList.remove('hidden');
        });
        document.getElementById('tag-options').addEventListener('click', (e) => {
          if (e.target.classList.contains('tag-option')) {
            e.stopPropagation();
            state.filters.tag = e.target.dataset.value;
            state.pagination.page = 1;
            renderTagDropdown();
            renderAll();
          }
        });

        dateBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = datePanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) datePanel.classList.remove('hidden');
        });
        datePanel.querySelectorAll('.date-option').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            state.filters.dateRange = btn.dataset.value;
            if (state.filters.dateRange !== 'custom') {
              document.getElementById('custom-start').value = '';
              document.getElementById('custom-end').value = '';
              state.filters.customStart = '';
              state.filters.customEnd = '';
            }
            state.pagination.page = 1;
            renderAll();
            updateDateDropdownUI();
          });
        });
        document.getElementById('custom-start').addEventListener('change', (e) => {
          state.filters.dateRange = 'custom';
          state.filters.customStart = e.target.value;
          state.pagination.page = 1;
          renderAll();
          updateDateDropdownUI();
        });
        document.getElementById('custom-end').addEventListener('change', (e) => {
          state.filters.dateRange = 'custom';
          state.filters.customEnd = e.target.value;
          state.pagination.page = 1;
          renderAll();
          updateDateDropdownUI();
        });

        sortBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = sortPanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) sortPanel.classList.remove('hidden');
        });
        sortPanel.querySelectorAll('.sort-option').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            state.sort = btn.dataset.value;
            state.pagination.page = 1;
            renderAll();
            updateSortDropdownUI();
          });
        });

        document.addEventListener('click', () => {
          closeAllPanels();
        });

        // Reset
        document.getElementById('reset-btn').addEventListener('click', () => {
          state.filters.search = '';
          state.filters.sources = data.sources.map(s => s.id);
          state.filters.tag = 'all';
          state.filters.dateRange = 'all';
          state.filters.customStart = '';
          state.filters.customEnd = '';
          state.sort = 'desc';
          state.pagination.page = 1;
          searchInput.value = '';
          searchClear.classList.add('hidden');
          document.getElementById('custom-start').value = '';
          document.getElementById('custom-end').value = '';
          renderSourceDropdown();
          renderTagDropdown();
          updateDateDropdownUI();
          updateSortDropdownUI();
          renderAll();
        });

        // Clear all filters
        document.getElementById('clear-all-filters').addEventListener('click', () => {
          state.filters.search = '';
          state.filters.sources = data.sources.map(s => s.id);
          state.filters.tag = 'all';
          state.filters.dateRange = 'all';
          state.filters.customStart = '';
          state.filters.customEnd = '';
          state.pagination.page = 1;
          searchInput.value = '';
          searchClear.classList.add('hidden');
          document.getElementById('custom-start').value = '';
          document.getElementById('custom-end').value = '';
          renderSourceDropdown();
          renderTagDropdown();
          updateDateDropdownUI();
          renderAll();
        });

        document.getElementById('empty-clear-btn').addEventListener('click', () => {
          document.getElementById('clear-all-filters').click();
        });

        // Refresh
        document.getElementById('refresh-btn').addEventListener('click', () => {
          refreshFromRSS();
        });

        // Load more
        document.getElementById('load-more-btn').addEventListener('click', () => {
          state.pagination.page += 1;
          renderPolicyList();
        });
      }

      function updateDateDropdownUI() {
        document.querySelectorAll('.date-option').forEach(btn => {
          const active = btn.dataset.value === state.filters.dateRange;
          btn.className = 'date-option w-full text-left px-3 py-2 rounded text-sm ' + (active ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
        });
      }

      function updateSortDropdownUI() {
        document.querySelectorAll('.sort-option').forEach(btn => {
          const active = btn.dataset.value === state.sort;
          btn.className = 'sort-option w-full text-left px-3 py-2 rounded text-sm ' + (active ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
        });
      }

      renderSourceDropdown();
      renderTagDropdown();
      bindEvents();
      renderAll();
    })();
  </script>
</body>
</html>
